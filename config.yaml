# Workshop configuration — the single tuning surface.
#
# Every knob the workshop asks you to experiment with lives in this file.
# After changing embedding or index settings, run `make reindex` and re-run
# the same search: the resultType line in the UI (and the `meta` block in
# the JSON response) shows which configuration answered.

redis:
  # Overridden by the REDIS_URL environment variable when set.
  url: redis://localhost:6379
  # Namespaces the index name, key prefix, and embedding caches so several
  # participants can safely share one Redis (e.g. a classroom Redis Cloud
  # instance). Overridden by WORKSHOP_RUN_ID when set.
  run_id: local

embedding:
  # hf     — local in-process ONNX embeddings (no API key, offline-capable)
  # openai — OpenAI embeddings API (requires OPENAI_API_KEY)
  provider: hf
  # hf options:
  #   sentence-transformers/all-MiniLM-L6-v2   (384 dims — small, fast)
  #   sentence-transformers/all-mpnet-base-v2  (768 dims — larger, better)
  # openai options:
  #   text-embedding-3-small (1536 dims)
  model: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32

index:
  # flat        — exact search; the right baseline for a small judged sample
  # hnsw        — approximate graph search; the usual production candidate
  # svs-vamana  — graph search with vector compression; memory-lean candidate
  algorithm: flat
  hnsw:
    m: 16
    ef_construction: 200
    ef_runtime: 10
  svs:
    # Quantization/compression: LVQ8 stores compressed vectors inside the
    # graph, trading a little recall for a lot of memory.
    compression: LVQ8

search:
  # text | vector | hybrid — the default when the UI/request does not choose.
  default_strategy: vector
  k: 10
  hybrid:
    # rrf    — reciprocal rank fusion (rank-based, robust default)
    # linear — weighted score fusion; alpha is the TEXT weight, so
    #          alpha: 0.65 means 65% lexical, 35% semantic.
    fusion: rrf
    alpha: 0.65
    rrf_window: 20
    rrf_constant: 60

server:
  addr: :8081
